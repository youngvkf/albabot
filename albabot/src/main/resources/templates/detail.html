<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlbaBot - 공고 상세</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #0ABF8A; --primary-dark: #059669;
  --bg: #F0FDF9; --surface: #fff;
  --border: #D1FAE5; --text: #111827; --text2: #6B7280; --text3: #9CA3AF;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); min-height: 100vh; }
.header {
  background: var(--surface); height: 56px; padding: 0 20px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
}
.back-btn {
  width: 38px; height: 38px; background: var(--bg); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; text-decoration: none; color: var(--text);
  border: 1px solid var(--border);
}
.header-title { font-size: 16px; font-weight: 700; color: var(--text); }
.container { max-width: 820px; margin: 0 auto; padding: 20px 20px 120px; }
.section {
  background: var(--surface); border-radius: 18px; padding: 22px;
  margin-bottom: 14px; border: 1px solid var(--border);
}
.job-header-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
.job-location { font-size: 14px; color: var(--text3); margin-bottom: 16px; }
.job-wage { font-size: 28px; font-weight: 900; color: var(--primary); margin-bottom: 18px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.info-item .info-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.3px; }
.info-item .info-value { font-size: 14px; font-weight: 600; color: var(--text); }
.badge-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.badge {
  padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
  background: #ECFDF5; color: var(--primary-dark);
}
.section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
.desc-text { font-size: 14px; color: var(--text2); line-height: 1.8; }
/* 리뷰 */
.review-item { padding: 16px 0; border-bottom: 1px solid var(--border); }
.review-item:last-child { border-bottom: none; padding-bottom: 0; }
.review-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.reviewer { font-size: 14px; font-weight: 600; color: var(--text); }
.stars { color: #F59E0B; font-size: 14px; letter-spacing: 1px; }
.review-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.no-review { text-align: center; padding: 20px; color: var(--text3); font-size: 14px; }
/* 지원 폼 */
.apply-section {
  background: var(--surface); border-radius: 18px; padding: 22px;
  border: 1px solid var(--border); margin-bottom: 14px;
}
.apply-section textarea {
  width: 100%; padding: 14px 16px; border: 1.5px solid #E5E7EB;
  border-radius: 12px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; color: var(--text); outline: none;
  resize: vertical; min-height: 100px; background: #F9FAFB;
  transition: border-color 0.2s;
}
.apply-section textarea:focus { border-color: var(--primary); background: #fff; }
/* 하단 버튼 */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); padding: 14px 20px 20px;
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
}
.apply-btn {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; border: none; border-radius: 14px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 16px rgba(10,191,138,0.3);
  transition: opacity 0.2s;
}
.apply-btn:hover { opacity: 0.9; }
.apply-btn:disabled { background: #D1D5DB; box-shadow: none; cursor: not-allowed; }
/* 알림 메시지 */
.msg-success {
  background: #ECFDF5; color: var(--primary-dark); border: 1px solid #A7F3D0;
  border-radius: 10px; padding: 12px 16px; font-size: 14px;
  margin-bottom: 14px; text-align: center;
}
.msg-error {
  background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA;
  border-radius: 10px; padding: 12px 16px; font-size: 14px;
  margin-bottom: 14px; text-align: center;
}
</style>
</head>
<body>
<div class="header">
  <a href="/jobs" class="back-btn">←</a>
  <div class="header-title">공고 상세</div>
</div>
<div class="container">
  <!-- 지원 결과 메시지 -->
  <div class="msg-success" th:if="${successMsg}" th:text="${successMsg}"></div>
  <div class="msg-error"   th:if="${errorMsg}"   th:text="${errorMsg}"></div>
 
  <!-- 공고 기본 정보 -->
  <div class="section">
    <div class="job-header-title" th:text="${job.title}">공고 제목</div>
    <div class="job-location"     th:text="${job.location}">위치</div>
    <div class="job-wage"
         th:if="${job.hourlyWage != null}"
         th:text="'시급 ' + ${#numbers.formatInteger(job.hourlyWage,3,'COMMA')} + '원'">시급</div>
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">근무 시간</div>
        <div class="info-value" th:text="${job.work_hours} ?: '-'">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">마감일</div>
        <div class="info-value" th:text="${job.deadline} ?: '-'">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">카테고리</div>
        <div class="info-value" th:text="${job.category} ?: '-'">-</div>
      </div>
      <div class="info-item">
        <div class="info-label">지원자 수</div>
        <div class="info-value" th:text="${applicationCount} + '명'">0명</div>
      </div>
    </div>
  </div>
 
  <!-- 업무 내용 -->
  <div class="section">
    <div class="section-title">업무 내용</div>
    <div class="desc-text" th:text="${job.description} ?: '상세 내용이 없습니다.'">내용</div>
  </div>
 
  <!-- 후기 및 평점 -->
  <div class="section">
    <div class="section-title">후기 및 평점</div>
    <div th:if="${#lists.isEmpty(evaluations)}" class="no-review">아직 후기가 없어요</div>
    <div th:each="eval : ${evaluations}" class="review-item">
      <div class="review-top">
        <span class="reviewer" th:text="${eval.reviewerName} ?: '익명'">이름</span>
        <span class="stars"
              th:text="${'★'.repeat(eval.score)} + ${'☆'.repeat(5 - eval.score)}">★★★★★</span>
      </div>
      <div class="review-text" th:text="${eval.comment}">후기 내용</div>
    </div>
  </div>
 
  <!-- 지원하기 폼 -->
  <div class="apply-section" th:if="${loginUser != null and !alreadyApplied}">
    <div class="section-title">지원하기</div>
    <form th:action="@{/jobs/{id}/apply(id=${job.jobId})}" method="post">
      <textarea name="coverLetter" placeholder="자기소개 및 지원 동기를 간단히 작성해주세요 (선택)"></textarea>
      <div style="height:12px;"></div>
      <button type="submit" class="apply-btn">지원하기</button>
    </form>
  </div>
 
  <!-- 이미 지원한 경우 -->
  <div class="msg-success" th:if="${alreadyApplied}">이미 지원한 공고예요 ✅</div>
 
  <!-- 로그인 필요 안내 -->
  <div class="msg-error" th:if="${loginUser == null}">
    지원하려면 <a href="/login" style="color:#059669;font-weight:700;">로그인</a>이 필요해요
  </div>
</div>
<div style="height:80px;"></div>
</body>
</html>
